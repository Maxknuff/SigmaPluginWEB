services:
  - type: web
    name: sigmasmp-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: SERVER_IP
        value: play.sigmasmp.de
      - key: FRONTEND_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
